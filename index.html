<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beast Platform v16 Ultimate</title>
<style>
body{font-family:Arial;direction:rtl;margin:0;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white;}
nav{background:black;padding:10px;display:flex;flex-wrap:wrap;justify-content:center;gap:6px;}
nav button{flex:1 1 40%;max-width:48%;padding:10px;border:none;border-radius:10px;background:cyan;color:black;font-weight:bold;cursor:pointer;}
section{display:none;padding:15px;}
.active{display:block;}
.card{background:white;color:black;padding:15px;margin:10px 0;border-radius:12px;position:relative;}
input{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:none;}
button{padding:8px 12px;border:none;border-radius:8px;cursor:pointer;margin-top:5px;font-weight:bold;}
.action{background:limegreen;}
.delete{background:red;color:white;margin-left:5px;}
.openBtn{background:#203a43;color:white;}
@media(min-width:768px){nav button{flex:none;max-width:none;}}
</style>
</head>
<body>

<nav>
<button onclick="show('home')">الرئيسية</button>
<button onclick="show('books')">📚 الكتب</button>
<button onclick="show('summaries')">📝 الملخصات</button>
<button onclick="show('videos')">🎥 الفيديوهات</button>
<button onclick="show('students')">👨‍🎓 أعمال الطلاب</button>
<button onclick="show('meetPage')">🎥 الاجتماع</button>
<button onclick="show('chatPage')">💬 الدردشة</button>
<button onclick="show('login')">دخول المعلم</button>
</nav>

<section id="home" class="active">
<h2>🔥 Beast Platform v16 Ultimate 🔥</h2>
<p>المحتوى مشترك عبر Google Sheet ويظهر لكل الأجهزة 👌</p>
</section>

<section id="books"><h2>📚 الكتب</h2><div id="bookList"></div></section>
<section id="summaries"><h2>📝 الملخصات</h2><div id="summaryList"></div></section>
<section id="videos"><h2>🎥 الفيديوهات</h2><div id="videoList"></div></section>
<section id="students"><h2>👨‍🎓 أعمال الطلاب</h2><div id="studentList"></div></section>

<section id="meetPage"><h2>🎥 الرابط المباشر للاجتماع</h2><div id="studentMeet"></div></section>

<section id="chatPage">
<h2>💬 الدردشة</h2>
<div style="margin-bottom:10px;">
<input type="text" id="studentNameInput" placeholder="اكتب اسمك">
<button onclick="saveStudentName()">حفظ الاسم</button>
</div>
<div id="chatBox" style="height:300px;overflow:auto;border:1px solid #ccc;margin-bottom:10px;padding:10px;"></div>
<input type="text" id="chatMessage" placeholder="اكتب رسالة">
<button onclick="sendMessage()">إرسال</button>
</section>

<section id="login">
<h2>🔐 دخول المعلم</h2>
<input type="password" id="pass" placeholder="كلمة المرور">
<button class="action" onclick="login()">دخول</button>
<p id="msg"></p>
</section>

<section id="panel">
<h2>👑 لوحة المعلم</h2>

<h3>📚 إضافة كتاب</h3>
<input type="text" id="bookTitle" placeholder="اسم الكتاب">
<input type="text" id="bookLink" placeholder="رابط Google Drive">
<button class="action" onclick="addToSheet('books')">حفظ الكتاب</button>

<h3>📝 إضافة ملخص</h3>
<input type="text" id="sumTitle" placeholder="اسم الملخص">
<input type="text" id="sumLink" placeholder="رابط Google Drive">
<button class="action" onclick="addToSheet('summaries')">حفظ الملخص</button>

<h3>🎥 إضافة فيديو</h3>
<input type="text" id="vidTitle" placeholder="اسم الفيديو">
<input type="text" id="vidLink" placeholder="رابط Google Drive للفيديو">
<button class="action" onclick="addToSheet('videos')">حفظ الفيديو</button>

<h3>👨‍🎓 إضافة عمل طالب</h3>
<input type="text" id="studentName" placeholder="اسم الطالب">
<input type="text" id="workTitle" placeholder="عنوان العمل">
<input type="text" id="workLink" placeholder="رابط Google Drive للعمل">
<button class="action" onclick="addToSheet('students')">حفظ العمل</button>

<h3>📌 روابط الاجتماعات</h3>
<input type="text" id="meetLink" placeholder="رابط الاجتماع">
<button class="action" onclick="addToSheet('meet')">حفظ الرابط</button>

<button onclick="show('home')" class="delete">خروج</button>
</section>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzW9PVYrxn8Mx_h8STSh1rhbu_Fi8Fv56Tp_Se5BU_DDt6vF6o1vWKFxEiYmNNiNIKc/exec";
let isTeacher=false;

function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function login(){
  if(document.getElementById("pass").value==="1234"){
      isTeacher=true;
      show("panel");
      fetchSheet();
      document.getElementById("msg").innerText="";
  } else {
      document.getElementById("msg").innerText="❌ كلمة المرور خطأ";
  }
}

function addToSheet(sheet){
  let data;
  if(sheet==="books") data={action:"add",sheet:"books",row:[document.getElementById("bookTitle").value,document.getElementById("bookLink").value]};
  if(sheet==="summaries") data={action:"add",sheet:"summaries",row:[document.getElementById("sumTitle").value,document.getElementById("sumLink").value]};
  if(sheet==="videos") data={action:"add",sheet:"videos",row:[document.getElementById("vidTitle").value,document.getElementById("vidLink").value]};
  if(sheet==="students") data={action:"add",sheet:"students",row:[document.getElementById("studentName").value,document.getElementById("workTitle").value,document.getElementById("workLink").value]};
  if(sheet==="meet") data={action:"add",sheet:"meet",row:[document.getElementById("meetLink").value]};
  
  fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify(data)}).then(()=>{alert("تم الرفع ✨"); fetchSheet();});
}

function deleteFromSheet(sheet,row){
  if(!confirm("هل أنت متأكد أنك تريد حذف هذا العنصر؟")) return;
  fetch(SCRIPT_URL,{method:"POST",body:JSON.stringify({action:"delete",sheet:sheet,row:row})})
  .then(()=>{alert("تم الحذف ✅"); fetchSheet();});
}

function fetchSheet(){
  fetch("https://docs.google.com/spreadsheets/d/1ZWsFu2o4XdxGy5qVQ_YAGsONVn_3nczVFfOebJ8smlE/gviz/tq?tqx=out:json")
  .then(res=>res.text())
  .then(txt=>{
    const json = JSON.parse(txt.substring(47).slice(0,-2));
    displayData(json.table.rows);
  });
}

function displayData(rows){
  let books=[],summaries=[],videos=[],students=[],meets=[];
  rows.forEach(r=>{
    const c=r.c;
    if(c.length==2){books.push({title:c[0]?.v,link:c[1]?.v}); summaries.push({title:c[0]?.v,link:c[1]?.v}); videos.push({title:c[0]?.v,link:c[1]?.v});}
    if(c.length==3){students.push({student:c[0]?.v,title:c[1]?.v,link:c[2]?.v});}
    if(c.length==1){meets.push({link:c[0]?.v});}
  });

  fillList("bookList",books);
  fillList("summaryList",summaries);
  fillList("videoList",videos);
  fillList("studentList",students,true);
  fillMeet(meets);

  if(isTeacher){
    fillListForTeacher("bookList",books,"books");
    fillListForTeacher("summaryList",summaries,"summaries");
    fillListForTeacher("videoList",videos,"videos");
    fillListForTeacher("studentList",students,"students",true);
  }
}

function fillList(id,list,isStudent=false){
  let html="";
  list.forEach(item=>{
    if(isStudent){html+=`<div class="card"><h3>${item.student}</h3><p>${item.title}</p><button class="openBtn" onclick="window.open('${item.link}','_blank')">فتح العمل</button></div>`;}
    else{html+=`<div class="card"><h3>${item.title}</h3><button class="openBtn" onclick="window.open('${item.link}','_blank')">فتح الملف</button></div>`;}
  });
  document.getElementById(id).innerHTML=html;
}

function fillListForTeacher(id,list,sheetName,isStudent=false){
  let html="";
  list.forEach(item=>{
    if(isStudent){
      html+=`<div class="card"><h3>${item.student}</h3><p>${item.title}</p>
      <button class="openBtn" onclick="window.open('${item.link}','_blank')">فتح العمل</button>
      <button class="delete" onclick="deleteFromSheet('${sheetName}', ['${item.student}','${item.title}','${item.link}'])">حذف</button></div>`;
    } else {
      html+=`<div class="card"><h3>${item.title}</h3>
      <button class="openBtn" onclick="window.open('${item.link}','_blank')">فتح الملف</button>
      <button class="delete" onclick="deleteFromSheet('${sheetName}', ['${item.title}','${item.link}'])">حذف</button></div>`;
    }
  });
  document.getElementById(id).innerHTML=html;
}

function fillMeet(list){let html="";list.forEach(i=>{html+=`<div class="card"><a href="${i.link}" target="_blank">${i.link}</a></div>`;});document.getElementById("studentMeet").innerHTML=html;}

function saveStudentName(){localStorage.setItem("studentName",document.getElementById("studentNameInput").value);alert("تم حفظ الاسم 👍");}
function sendMessage(){let msg=document.getElementById("chatMessage").value;document.getElementById("chatBox").innerHTML+=`<div class='card'><strong>${localStorage.getItem("studentName")} :</strong> ${msg}</div>`;document.getElementById("chatMessage").value="";}

fetchSheet();
</script>
</body>
</html>
