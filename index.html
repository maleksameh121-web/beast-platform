<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beast Platform V16 GitHub</title>
<style>
body{font-family:Arial;direction:rtl;margin:0;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);color:white;}
nav{background:black;padding:10px;display:flex;flex-wrap:wrap;justify-content:center;gap:6px;}
nav button{flex:1 1 40%;max-width:48%;padding:10px;border:none;border-radius:10px;background:cyan;color:black;font-weight:bold;cursor:pointer;}
section{display:none;padding:15px;}
.active{display:block;}
.card{background:white;color:black;padding:15px;margin:10px 0;border-radius:12px;}
input{width:100%;padding:8px;margin:5px 0;border-radius:8px;border:none;}
button{padding:8px 12px;border:none;border-radius:8px;cursor:pointer;margin-top:5px;font-weight:bold;}
.action{background:limegreen;}
.openBtn{background:#203a43;color:white;}
@media(min-width:768px){nav button{flex:none;max-width:none;}}
</style>
</head>
<body>

<nav>
<button onclick="show('home')">الرئيسية</button>
<button onclick="show('books')">📚 الكتب</button>
<button onclick="show('summaries')">📝 الملخصات</button>
<button onclick="show('videos')">🎥 الفيديوهات</button>
<button onclick="show('students')">👨‍🎓 أعمال الطلاب</button>
<button onclick="show('meet')">🎥 الاجتماع</button>
<button onclick="show('login')">👑 دخول المعلم</button>
</nav>

<section id="home" class="active">
<h2>🔥 Beast Platform V16 GitHub Edition 🔥</h2>
<p>المنصة شغالة أونلاين عبر GitHub Pages</p>
</section>

<section id="books"><h2>📚 الكتب</h2><div id="bookList"></div></section>
<section id="summaries"><h2>📝 الملخصات</h2><div id="summaryList"></div></section>
<section id="videos"><h2>🎥 الفيديوهات</h2><div id="videoList"></div></section>
<section id="students"><h2>👨‍🎓 أعمال الطلاب</h2><div id="studentList"></div></section>

<section id="meet"><h2>🎥 الاجتماع</h2><div id="meetLink"></div></section>

<section id="login">
<h2>🔐 دخول المعلم</h2>
<input type="password" id="pass" placeholder="كلمة المرور">
<button class="action" onclick="login()">دخول</button>
<p id="msg"></p>
</section>

<section id="panel">
<h2>👑 لوحة المعلم</h2>
<p>⚠️ لإضافة محتوى عدّل ملف data.json في GitHub</p>
<button onclick="show('home')" style="background:red;color:white;">خروج</button>
</section>

<script>

const DATA_URL = "data.json";

function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
}

function login(){
if(document.getElementById("pass").value==="1234"){
show("panel");
document.getElementById("msg").innerText="";
}else{
document.getElementById("msg").innerText="❌ كلمة المرور خطأ";
}
}

fetch(DATA_URL)
.then(res=>res.json())
.then(data=>{

data.books.forEach(b=>{
document.getElementById("bookList").innerHTML+=
`<div class="card"><h3>${b.title}</h3><button class="openBtn" onclick="window.open('${b.link}')">فتح</button></div>`;
});

data.summaries.forEach(s=>{
document.getElementById("summaryList").innerHTML+=
`<div class="card"><h3>${s.title}</h3><button class="openBtn" onclick="window.open('${s.link}')">فتح</button></div>`;
});

data.videos.forEach(v=>{
document.getElementById("videoList").innerHTML+=
`<div class="card"><h3>${v.title}</h3><button class="openBtn" onclick="window.open('${v.link}')">مشاهدة</button></div>`;
});

data.students.forEach(st=>{
document.getElementById("studentList").innerHTML+=
`<div class="card"><h3>${st.student}</h3><p>${st.title}</p><button class="openBtn" onclick="window.open('${st.link}')">فتح</button></div>`;
});

if(data.meet){
document.getElementById("meetLink").innerHTML=
`<div class="card"><a href="${data.meet}" target="_blank">🎥 دخول الاجتماع</a></div>`;
}

});

</script>

</body>
</html>
